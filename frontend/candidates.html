<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidates — FinSignal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
      </div>
      <span class="brand-name">FinSignal</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span data-i18n="nav_home">Home</span>
      </a>
      <div class="nav-group-label" data-i18n="nav_discover">Discover</div>
      <a href="candidates.html" class="nav-item nav-item--active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
        </svg>
        <span data-i18n="nav_candidates">Candidates</span>
      </a>
      <a href="ranking.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line>
          <circle cx="3" cy="6" r="1" fill="currentColor"></circle><circle cx="3" cy="12" r="1" fill="currentColor"></circle><circle cx="3" cy="18" r="1" fill="currentColor"></circle>
        </svg>
        <span data-i18n="nav_signal_ranking">Signal Ranking</span>
      </a>
      <div class="nav-group-label" data-i18n="nav_deep_dive">Deep Dive</div>
      <a href="search.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span data-i18n="nav_company_search">Company Search</span>
      </a>
      <a href="compare.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line>
        </svg>
        <span data-i18n="nav_compare">Compare</span>
      </a>
      <a href="reports.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
        <span data-i18n="nav_reports">AI Report</span>
      </a>
      <div class="nav-group-label" data-i18n="nav_system">System</div>
      <a href="settings.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span data-i18n="nav_settings">Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="health-row">
        <span class="health-dot" id="healthDot"></span>
        <span class="health-label" id="healthLabel" data-i18n="health_connecting">Connecting…</span>
      </div>
      <div class="sidebar-meta-row" style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
        <div class="sidebar-meta">FSM v0.1 &nbsp;·&nbsp; CN + TW</div>
        <button id="langToggleBtn" style="font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border,#374151);background:transparent;color:var(--text-secondary,#9ca3af);cursor:pointer;line-height:1.4">中文</button>
      </div>
    </div>
  </aside>

  <div class="main-wrapper">

    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title" data-i18n="page_candidates">持续换手候选池</h1>
        <span class="page-crumb" data-i18n="nav_discover">Discover</span>
      </div>
      <div class="topbar-right">
        <span class="loading-tag" id="loadingTag" style="display:none">
          <span class="spinner"></span><span data-i18n="loading_text">Loading</span>
        </span>
        <button id="refreshBtn" class="btn-refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          <span data-i18n="btn_refresh">Refresh</span>
        </button>
      </div>
    </header>

    <main class="content">

      <!-- Filter bar -->
      <div class="panel" style="margin-bottom: var(--s4)">
        <div class="panel-header" style="padding-bottom: 0">
          <div class="panel-header-left">
            <h2 class="panel-title" data-i18n="cand_filter_title">筛选条件</h2>
          </div>
          <button id="resetBtn" class="btn btn--outline" style="height:30px;font-size:12px" data-i18n="btn_reset">重置</button>
        </div>
        <div class="candidates-filters" id="filterBar">
          <div class="filter-field filter-field--range">
            <input id="fTurnoverMin" type="number" class="filter-input" value="2" min="0" max="100" step="0.5" />
            <span class="filter-range-label" data-i18n="cand_turnover_range_label">&lt; 今日换手% &lt;</span>
            <input id="fTurnoverMax" type="number" class="filter-input" value="" min="0" max="100" step="0.5" placeholder="∞" />
          </div>
          <label class="filter-field">
            <span class="filter-label" data-i18n="cand_price_label">现价 &lt;</span>
            <input id="fPriceMax" type="number" class="filter-input" value="20" min="0" step="1" />
            <span class="filter-unit" data-i18n="cand_unit_yuan">元</span>
          </label>
          <label class="filter-field">
            <span class="filter-label" data-i18n="cand_circmv_label">流通市值 &lt;</span>
            <input id="fCircMvMax" type="number" class="filter-input" value="80" min="0" step="10" />
            <span class="filter-unit" data-i18n="cand_unit_yi">亿</span>
          </label>
          <label class="filter-field">
            <span class="filter-label" data-i18n="cand_pct_label">今日涨幅 &lt;</span>
            <input id="fPctMax" type="number" class="filter-input" value="9" min="0" max="20" step="1" />
            <span class="filter-unit" data-i18n="cand_unit_pct">%</span>
          </label>
          <label class="filter-field filter-field--check">
            <input id="fExcludeSt" type="checkbox" checked />
            <span class="filter-label" data-i18n="cand_exclude_st">排除 ST</span>
          </label>
          <button id="applyBtn" class="btn btn--primary" style="height:34px" data-i18n="btn_apply">应用</button>
        </div>
      </div>

      <!-- Results table -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-header-left">
            <h2 class="panel-title" data-i18n="cand_table_title">候选股票</h2>
            <span class="panel-meta" id="tableInfo"></span>
            <span class="panel-meta" id="circMvHint" data-i18n="cand_circmv_hint">流通市值 = 可上市流通部分对应市值</span>
          </div>
          <div style="text-align:right;line-height:1.6">
            <div style="font-size:11px;color:var(--text-tertiary,#9ca3af)">
              <span data-i18n="cand_trading_date_label">对应交易日：</span><code id="tradingDateDisplay" style="font-size:11px;letter-spacing:.3px;color:#111827">—</code>
              <button id="prevTradingDateBtn" class="btn btn--outline" style="height:24px;padding:0 8px;margin-left:8px;font-size:11px;display:none">前一天</button>
            </div>
            <div style="font-size:11px;color:var(--text-tertiary,#9ca3af)">
              <span data-i18n="cand_akshare_label">AKShare 抓取：</span><code id="serverFetchTime" style="font-size:11px;letter-spacing:.3px">—</code>
            </div>
            <div style="font-size:11px;color:var(--text-tertiary,#9ca3af)">
              <span data-i18n="cand_request_label">本次请求：</span><code id="clientFetchTime" style="font-size:11px;letter-spacing:.3px">—</code>
            </div>
          </div>
        </div>
        <div id="tableContainer" class="table-container"></div>
        <div id="paginationBar" class="pagination-bar" style="display:none"></div>
      </div>

    </main>

    <footer class="sys-footer">
      <span data-i18n="footer_data_source">Data source: backend API</span>
      <span class="dot">·</span>
      <span><span data-i18n="footer_base_url">Base URL:</span> <code class="footer-api-base">—</code></span>
      <span class="dot">·</span>
      <span id="lastUpdated">—</span>
    </footer>

  </div>
</div>

<script src="i18n.js"></script>
<script src="auth.js"></script>
<script src="api.js"></script>
<script src="candidates.js"></script>
</body>
</html>
