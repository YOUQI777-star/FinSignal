<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Ranking — FinSignal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
      </div>
      <span class="brand-name">FinSignal</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span data-i18n="nav_home">Home</span>
      </a>
      <div class="nav-group-label" data-i18n="nav_discover">Discover</div>
      <a href="candidates.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
        </svg>
        <span data-i18n="nav_candidates">Candidates</span>
      </a>
      <a href="ranking.html" class="nav-item nav-item--active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line>
          <circle cx="3" cy="6" r="1" fill="currentColor"></circle><circle cx="3" cy="12" r="1" fill="currentColor"></circle><circle cx="3" cy="18" r="1" fill="currentColor"></circle>
        </svg>
        <span data-i18n="nav_signal_ranking">Signal Ranking</span>
      </a>
      <div class="nav-group-label" data-i18n="nav_deep_dive">Deep Dive</div>
      <a href="search.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span data-i18n="nav_company_search">Company Search</span>
      </a>
      <a href="compare.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line>
        </svg>
        <span data-i18n="nav_compare">Compare</span>
      </a>
      <a href="reports.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
        <span data-i18n="nav_reports">AI Report</span>
      </a>
      <div class="nav-group-label" data-i18n="nav_system">System</div>
      <a href="settings.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span data-i18n="nav_settings">Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="health-row">
        <span class="health-dot" id="healthDot"></span>
        <span class="health-label" id="healthLabel" data-i18n="health_connecting">Connecting…</span>
      </div>
      <div class="sidebar-meta-row" style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
        <div class="sidebar-meta">FSM v0.1 &nbsp;·&nbsp; CN + TW</div>
        <button id="langToggleBtn" style="font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border,#374151);background:transparent;color:var(--text-secondary,#9ca3af);cursor:pointer;line-height:1.4">中文</button>
      </div>
    </div>
  </aside>

  <div class="main-wrapper">

    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title" data-i18n="page_ranking">Signal Ranking</h1>
        <span class="page-crumb" data-i18n="rank_crumb">Full List</span>
      </div>

      <div class="topbar-center" style="max-width:240px">
        <div class="search-wrap" id="searchWrap">
          <div class="search-field">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="searchInput" type="text" placeholder="Filter by name or code…" data-i18n-placeholder="rank_filter_placeholder" autocomplete="off" spellcheck="false" />
          </div>
        </div>
      </div>

      <div class="topbar-right">
        <select id="marketFilter" class="filter-select">
          <option value="" data-i18n="opt_all_markets">All Markets</option>
          <option value="CN">A-Share (CN)</option>
          <option value="TW">Taiwan (TW)</option>
        </select>
        <select id="signalFilter" class="filter-select">
          <option value="" data-i18n="opt_all_rules">All Rules</option>
          <option value="F1">F1 — AR Growth</option>
          <option value="F2">F2 — Cash Flow</option>
          <option value="F3">F3 — Leverage</option>
          <option value="F4">F4 — Margin</option>
          <option value="G1">G1 — Pledge</option>
          <option value="G3">G3 — Board</option>
        </select>
        <select id="limitSelect" class="filter-select">
          <option value="20">20 rows</option>
          <option value="50" selected>50 rows</option>
          <option value="100">100 rows</option>
          <option value="200">200 rows</option>
        </select>
        <span class="loading-tag" id="loadingTag" style="display:none">
          <span class="spinner"></span><span data-i18n="loading_text">Loading</span>
        </span>
        <button id="exportBtn" class="btn btn--outline" style="height:34px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span data-i18n="btn_export">Export</span> CSV
        </button>
        <button id="refreshBtn" class="btn-refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          <span data-i18n="btn_refresh">Refresh</span>
        </button>
      </div>
    </header>

    <main class="content">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-header-left">
            <h2 class="panel-title" data-i18n="rank_title">Signal Ranking</h2>
            <span class="panel-meta" id="tableInfo"></span>
          </div>
        </div>
        <div id="tableContainer" class="table-container"></div>
      </div>
    </main>

    <footer class="sys-footer">
      <span data-i18n="footer_data_source">Data source: backend API</span>
      <span class="dot">·</span>
      <span><span data-i18n="footer_base_url">Base URL:</span> <code class="footer-api-base">—</code></span>
      <span class="dot">·</span>
      <span id="lastUpdated">—</span>
    </footer>

  </div>
</div>

<div id="toastContainer" class="toast-container"></div>
<script src="i18n.js"></script>
<script src="api.js"></script>
<script src="ranking.js"></script>
</body>
</html>
